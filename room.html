<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>holid.ai — Upload your calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --sand:#F6F1E9;--sand-mid:#EDE6DA;--sand-dark:#DDD4C4;
  --ink:#1A1814;--ink-muted:#6B6460;--ink-faint:#AEA8A1;
  --accent:#E8622A;--accent-dim:#FDF0EB;
  --teal:#1A8A72;--teal-dim:#E3F5F0;
  --white:#FFFFFF;
  --font-d:'Fraunces',serif;--font-b:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{background:var(--sand);font-family:var(--font-b);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--sand-dark);background:var(--sand)}
.logo{font-family:var(--font-d);font-size:20px;font-weight:400;font-style:italic}
.logo b{color:var(--accent);font-weight:400}
.main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:48px 24px 64px}
.card{background:var(--white);border-radius:20px;width:100%;max-width:480px;overflow:hidden}
.card-top{padding:28px 28px 24px;border-bottom:1px solid var(--sand-mid)}
.trip-name{font-family:var(--font-d);font-size:26px;font-weight:300;font-style:italic;margin-bottom:4px}
.trip-meta{font-size:13px;color:var(--ink-muted)}
.inviter{display:flex;align-items:center;gap:8px;margin-top:14px;background:var(--sand);border-radius:10px;padding:10px 14px}
.inv-av{width:28px;height:28px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.inv-text{font-size:13px;color:var(--ink-muted)}
.inv-text strong{color:var(--ink);font-weight:500}
.card-body{padding:24px 28px}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);font-weight:500;margin-bottom:14px}
.member-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--sand)}
.member-row:last-child{border-bottom:none}
.m-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.m-name{flex:1;font-size:13px;font-weight:500}
.m-badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap}
.mb-done{background:var(--teal-dim);color:var(--teal)}
.mb-you{background:var(--accent-dim);color:var(--accent)}
.mb-wait{background:var(--sand-mid);color:var(--ink-muted)}
.privacy-box{background:var(--sand);border-radius:12px;padding:14px 16px;margin:20px 0;display:flex;gap:10px;align-items:flex-start}
.priv-title{font-size:13px;font-weight:500;margin-bottom:3px}
.priv-body{font-size:12px;color:var(--ink-muted);line-height:1.6}
.upload-area{border:1.5px dashed var(--sand-dark);border-radius:14px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;margin-bottom:12px}
.upload-area:hover,.upload-area.dragging{border-color:var(--accent);background:var(--accent-dim)}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{width:40px;height:40px;border-radius:50%;background:var(--sand);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.upload-title{font-size:14px;font-weight:500;margin-bottom:4px}
.upload-sub{font-size:12px;color:var(--ink-muted);line-height:1.5}
.how-to{background:var(--sand);border-radius:12px;padding:14px 16px;margin-bottom:16px}
.how-title{font-size:12px;font-weight:500;margin-bottom:8px}
.how-step{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px}
.how-step:last-child{margin-bottom:0}
.how-num{width:18px;height:18px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--ink-muted);flex-shrink:0;margin-top:1px}
.how-text{font-size:12px;color:var(--ink-muted);line-height:1.5}
.success{display:none;text-align:center;padding:12px 0}
.success.show{display:block}
.success-icon{width:56px;height:56px;border-radius:50%;background:var(--teal-dim);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.success-title{font-family:var(--font-d);font-size:22px;font-weight:300;margin-bottom:8px}
.success-sub{font-size:14px;color:var(--ink-muted);line-height:1.6;max-width:320px;margin:0 auto}
.windows-found{margin:20px 0 0}
.wf-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);font-weight:500;margin-bottom:10px}
.wf-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--sand)}
.wf-item:last-child{border-bottom:none}
.wf-dates{font-family:var(--font-d);font-size:14px}
.wf-badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--teal-dim);color:var(--teal)}
/* NAME INPUT */
.name-step{margin-bottom:20px}
.name-input-row{display:flex;gap:8px}
.name-input{flex:1;background:var(--white);border:1.5px solid var(--sand-dark);border-radius:10px;padding:10px 14px;font-family:var(--font-b);font-size:14px;color:var(--ink);outline:none;transition:border-color .2s}
.name-input:focus{border-color:var(--accent)}
.name-input::placeholder{color:var(--ink-faint)}
.name-btn{background:var(--accent);color:var(--white);border:none;border-radius:10px;padding:10px 18px;font-family:var(--font-b);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.name-btn:hover{opacity:.85}
/* LOADING */
.loading{text-align:center;padding:40px 20px;color:var(--ink-muted);font-size:14px}
.error-state{text-align:center;padding:40px 20px}
.error-title{font-family:var(--font-d);font-size:20px;margin-bottom:8px}
.error-sub{font-size:13px;color:var(--ink-muted)}

/* DATE PICKER */
.dp-month { margin-bottom: 24px; }
.dp-month-title { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 10px; text-transform: capitalize; }
.dp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.dp-dow { font-size: 10px; font-weight: 500; color: var(--ink-faint); text-align: center; padding-bottom: 4px; text-transform: uppercase; }
.dp-day { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; transition: all .12s; color: var(--ink); background: var(--sand); border: 1.5px solid transparent; user-select: none; }
.dp-day:hover { border-color: var(--accent); background: var(--accent-dim); }
.dp-day.selected { background: var(--teal); color: white; border-color: var(--teal); }
.dp-day.today { border-color: var(--accent); font-weight: 500; }
.dp-day.past { color: var(--ink-faint); cursor: default; background: transparent; }
.dp-day.past:hover { border-color: transparent; background: transparent; }
.dp-day.empty { background: transparent; cursor: default; }
.dp-day.empty:hover { border-color: transparent; }
.dp-legend { display: flex; gap: 16px; margin-bottom: 16px; }
.dp-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-muted); }
.dp-legend-dot { width: 12px; height: 12px; border-radius: 4px; }
.submit-btn { width: 100%; padding: 13px; background: var(--accent); color: var(--white); border: none; border-radius: 12px; font-family: var(--font-b); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 20px; transition: opacity .15s; }
.submit-btn:hover { opacity: .85; }
.dp-count { font-size: 12px; color: var(--teal); font-weight: 500; margin-top: 8px; text-align: center; min-height: 18px; }
</style>
</head>
<body>

<header>
  <a href="/" style="text-decoration:none;color:inherit;cursor:pointer;font-family:var(--font-d);font-size:20px;font-weight:400;font-style:italic">holid<b style="color:var(--accent);font-weight:400">.</b>ai</a>
</header>

<div class="main">
  <div class="card" id="main-card">
    <div id="loading-state" class="loading">Loading trip...</div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code') || '';
let tripData = null;
let memberId = null;
let tripId = null;

// Load trip from Supabase on page load
async function loadTrip(){
  if(!code){
    showError('No trip code found', 'Check the link you were sent and try again.');
    return;
  }

  try {
    const res = await fetch(`/api/trip?action=get&code=${code}`);
    const data = await res.json();

    if(data.error || !data.trip){
      showError('Trip not found', 'This link may have expired or the trip was deleted.');
      return;
    }

    tripData = data;
    tripId = data.trip.id;
    renderTrip(data);
  } catch(err) {
    showError('Could not load trip', 'Check your connection and try again.');
  }
}

function renderTrip(data){
  const trip = data.trip;
  const members = data.members || [];
  const connected = members.filter(m => m.calendar_connected).length;

  const membersHTML = members.map((m, i) => {
    const colors = ['#FDF0EB','#E3F5F0','#EEECFB','#FBF4E3'];
    const tcolors = ['#E8622A','#1A8A72','#4A3FBF','#8A6400'];
    const bg = m.color_bg || colors[i % 4];
    const tc = m.color_text || tcolors[i % 4];
    const badge = m.calendar_connected
      ? `<div class="m-badge mb-done">Calendar uploaded ✓</div>`
      : `<div class="m-badge mb-wait">Waiting...</div>`;
    return `<div class="member-row"><div class="m-av" style="background:${bg};color:${tc}">${m.initials}</div><div class="m-name">${m.name}</div>${badge}</div>`;
  }).join('');

  const organiser = members[0] ? members[0].name : 'Someone';

  document.getElementById('main-card').innerHTML = `
    <div class="card-top">
      <div class="trip-name">${trip.destination || 'Your trip'}</div>
      <div class="trip-meta">${trip.dates || ''} · ${members.length} people</div>
      <div class="inviter">
        <div class="inv-av">${organiser.substring(0,2).toUpperCase()}</div>
        <div class="inv-text"><strong>${organiser}</strong> invited you to plan this trip</div>
      </div>
    </div>

    <div class="card-body">
      <div class="section-label">Who's in</div>
      <div id="members-list">${membersHTML}</div>

      <div class="privacy-box">
        <div>
          <div class="priv-title">Your calendar stays private</div>
          <div class="priv-body">holid.ai only reads busy/free blocks. Never your event titles, descriptions, or who you're meeting. Your friends cannot see your calendar data.</div>
        </div>
      </div>

      <div id="name-step" class="name-step">
        <div class="section-label">What's your name?</div>
        <div class="name-input-row">
          <input class="name-input" id="name-input" type="text" placeholder="Your first name" autocomplete="given-name"/>
          <button class="name-btn" onclick="submitName()">Next</button>
        </div>
      </div>

      <div id="upload-form" style="display:none">
        <div class="section-label">When are you free for a trip?</div>
        <p style="font-size:13px;color:var(--ink-muted);margin-bottom:16px;line-height:1.6">Tap the days you could go on holiday. We'll find when everyone in the group is free.</p>
        <div id="date-picker"></div>
        <button class="submit-btn" id="submit-avail" onclick="submitAvailability()" style="display:none">
          Save my availability
        </button>
      </div>

      <div class="success" id="success-state">
        <div class="success-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 12L10 17L19 7" stroke="#1A8A72" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="success-title">Calendar uploaded</div>
        <div class="success-sub">holid.ai is checking your availability against the group. You'll hear back once everyone has uploaded.</div>
        <div class="windows-found" id="windows-found"></div>
      </div>
    </div>`;

  // Set up drag and drop
  const dropZone = document.getElementById('drop-zone');
  if(dropZone){
    dropZone.addEventListener('dragover', e=>{ e.preventDefault(); dropZone.classList.add('dragging'); });
    dropZone.addEventListener('dragleave', ()=>dropZone.classList.remove('dragging'));
    dropZone.addEventListener('drop', e=>{
      e.preventDefault(); dropZone.classList.remove('dragging');
      const file = e.dataTransfer.files[0];
      if(file && file.name.endsWith('.ics')) handleFile(file);
    });
  }

  // Enter key on name input
  const nameInput = document.getElementById('name-input');
  if(nameInput) nameInput.addEventListener('keydown', e=>{ if(e.key==='Enter') submitName(); });
}

async function submitName(){
  const input = document.getElementById('name-input');
  const name = input ? input.value.trim() : '';
  if(!name) return;

  try {
    const res = await fetch('/api/trip?action=join', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, name })
    });
    const data = await res.json();
    if(data.memberId){
      memberId = data.memberId;
      tripId = data.tripId;
    }
  } catch(err) {
    console.warn('Could not join via API, continuing locally');
  }

  // Hide name step, show upload form + build date picker
  document.getElementById('name-step').style.display = 'none';
  document.getElementById('upload-form').style.display = 'block';
  buildDatePicker();
}

// ── DATE PICKER ──
const selectedDays = new Set();

function buildDatePicker(){
  const container = document.getElementById('date-picker');
  if(!container) return;

  const today = new Date();
  today.setHours(0,0,0,0);
  const todayStr = today.toISOString().split('T')[0];

  // Legend
  container.innerHTML = `
    <div class="dp-legend">
      <div class="dp-legend-item"><div class="dp-legend-dot" style="background:var(--teal)"></div>I'm free</div>
      <div class="dp-legend-item"><div class="dp-legend-dot" style="background:var(--sand);border:1.5px solid var(--sand-dark)"></div>Not selected</div>
    </div>
    <div class="dp-count" id="dp-count"></div>
  `;

  // Build 6 months
  for(let m = 0; m < 6; m++){
    const date = new Date(today.getFullYear(), today.getMonth() + m, 1);
    const monthEl = document.createElement('div');
    monthEl.className = 'dp-month';

    const monthName = date.toLocaleDateString('nl-NL', { month: 'long', year: 'numeric' });
    monthEl.innerHTML = `<div class="dp-month-title">${monthName}</div><div class="dp-grid" id="grid-${m}"></div>`;
    container.appendChild(monthEl);

    const grid = monthEl.querySelector('.dp-grid');

    // Day of week headers (ma di wo do vr za zo)
    const days = ['ma','di','wo','do','vr','za','zo'];
    days.forEach(d => {
      const h = document.createElement('div');
      h.className = 'dp-dow';
      h.textContent = d;
      grid.appendChild(h);
    });

    // Empty cells before first day (Monday = 0)
    const firstDay = date.getDay(); // 0=Sun, 1=Mon...
    const offset = firstDay === 0 ? 6 : firstDay - 1;
    for(let i = 0; i < offset; i++){
      const empty = document.createElement('div');
      empty.className = 'dp-day empty';
      grid.appendChild(empty);
    }

    // Days of month
    const daysInMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
    for(let day = 1; day <= daysInMonth; day++){
      const d = new Date(date.getFullYear(), date.getMonth(), day);
      const dateStr = d.toISOString().split('T')[0];
      const isPast = d < today;

      const cell = document.createElement('div');
      cell.className = 'dp-day' + (isPast ? ' past' : '') + (dateStr === todayStr ? ' today' : '');
      if(selectedDays.has(dateStr)) cell.classList.add('selected');
      cell.textContent = day;
      cell.dataset.date = dateStr;

      if(!isPast){
        cell.addEventListener('click', () => toggleDay(cell, dateStr));
      }
      grid.appendChild(cell);
    }
  }
}

function toggleDay(cell, dateStr){
  if(selectedDays.has(dateStr)){
    selectedDays.delete(dateStr);
    cell.classList.remove('selected');
  } else {
    selectedDays.add(dateStr);
    cell.classList.add('selected');
  }
  updateCount();
}

function updateCount(){
  const count = selectedDays.size;
  const countEl = document.getElementById('dp-count');
  const btn = document.getElementById('submit-avail');
  if(countEl) countEl.textContent = count > 0 ? `${count} day${count === 1 ? '' : 's'} selected` : '';
  if(btn) btn.style.display = count > 0 ? 'block' : 'none';
}

async function submitAvailability(){
  const btn = document.getElementById('submit-avail');
  if(btn){ btn.textContent = 'Saving...'; btn.disabled = true; }

  // Convert selected days to busy periods (days NOT selected = busy)
  // We send available days, server computes overlap
  const availableDays = Array.from(selectedDays).sort();

  // Build busy periods from gaps in availability
  // Simpler: send available days directly as "free periods"
  const freePeriods = availableDays.map(d => ({ start: d, end: d }));

  try {
    if(memberId && tripId){
      const res = await fetch('/api/trip?action=availability', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ memberId, tripId, availableDays })
      });
      await res.json();
    }
  } catch(err) {
    console.warn('Could not save availability, continuing locally');
  }

  showSuccess(availableDays.length);
}

function handleFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    const { busyPeriods, freeWindows } = parseICS(text);
    uploadCalendar(busyPeriods, freeWindows, file.name);
  };
  reader.readAsText(file);
}

function parseICS(text){
  const busyPeriods = [];

  // Normalize line endings and unfold folded lines (RFC 5545)
  const normalized = text
    .replace(/\r\n/g, '\n')
    .replace(/\r/g, '\n')
    .replace(/\n[ \t]/g, ''); // unfold continuation lines

  const blocks = normalized.split('BEGIN:VEVENT');

  blocks.slice(1).forEach(block => {
    // Skip cancelled events
    const statusMatch = block.match(/^STATUS:(.+)$/m);
    if(statusMatch && statusMatch[1].trim() === 'CANCELLED') return;

    // Skip declined events (from attendee perspective)
    if(block.includes('PARTSTAT=DECLINED')) return;

    // Match DTSTART — handles VALUE=DATE, TZID=..., plain, with Z
    const sMatch = block.match(/^DTSTART(?:;[^:]+)?:(.+)$/m);
    const eMatch = block.match(/^DTEND(?:;[^:]+)?:(.+)$/m);
    const durMatch = block.match(/^DURATION:(.+)$/m);

    if(!sMatch) return;

    const start = parseICSDate(sMatch[1].trim());
    if(!start || isNaN(start)) return;

    let end;
    if(eMatch){
      end = parseICSDate(eMatch[1].trim());
    } else if(durMatch){
      end = new Date(start);
      const days = durMatch[1].match(/(\d+)D/);
      const hours = durMatch[1].match(/T(\d+)H/);
      if(days) end.setDate(end.getDate() + parseInt(days[1]));
      else if(hours) end.setHours(end.getHours() + parseInt(hours[1]));
      else end.setDate(end.getDate() + 1);
    } else {
      // No DTEND — assume 1 day (common for all-day events)
      end = new Date(start);
      end.setDate(end.getDate() + 1);
    }

    if(!end || isNaN(end)) return;

    const startStr = start.toISOString().split('T')[0];
    const endStr = end.toISOString().split('T')[0];

    // Only add events that are in the future and have valid duration
    const today = new Date();
    today.setHours(0,0,0,0);
    if(end >= today && endStr >= startStr){
      busyPeriods.push({ start: startStr, end: endStr });
    }
  });

  // Find free 7-day windows in next 6 months
  const freeWindows = [];
  const today = new Date();
  today.setHours(0,0,0,0);
  let d = new Date(today);
  d.setDate(d.getDate() + 7);
  const sixMonths = new Date(today);
  sixMonths.setMonth(sixMonths.getMonth() + 6);

  while(d < sixMonths && freeWindows.length < 5){
    const wEnd = new Date(d);
    wEnd.setDate(wEnd.getDate() + 7);
    const busy = busyPeriods.some(b => {
      const bs = new Date(b.start);
      const be = new Date(b.end);
      return bs < wEnd && be > d;
    });
    if(!busy) freeWindows.push({ label: formatRange(d, wEnd) });
    d.setDate(d.getDate() + 7);
  }

  return { busyPeriods, freeWindows };
}

function parseICSDate(str){
  str = str.trim();
  // Remove Z suffix
  str = str.replace(/Z$/, '');
  // If datetime format (contains T), extract just the date+time
  // Format: 20250901T143000 or 20250901
  const dateStr = str.replace(/T.*$/, ''); // strip time portion
  if(dateStr.length >= 8){
    const y = dateStr.substr(0,4);
    const m = dateStr.substr(4,2);
    const d = dateStr.substr(6,2);
    // Validate
    if(y && m && d && !isNaN(y) && !isNaN(m) && !isNaN(d)){
      return new Date(`${y}-${m}-${d}`);
    }
  }
  return null;
}

function formatRange(s, e){
  const o = {month:'short', day:'numeric'};
  return `${s.toLocaleDateString('en-GB',o)} – ${e.toLocaleDateString('en-GB',o)}`;
}

async function uploadCalendar(busyPeriods, freeWindows, filename){
  // Show uploading state
  const dropZone = document.getElementById('drop-zone');
  if(dropZone) dropZone.style.opacity = '0.5';

  try {
    if(memberId && tripId){
      const res = await fetch('/api/trip?action=calendar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ memberId, tripId, busyPeriods })
      });
      const data = await res.json();
      showSuccess(filename, freeWindows, data.windows);
    } else {
      showSuccess(filename, freeWindows, []);
    }
  } catch(err) {
    showSuccess(filename, freeWindows, []);
  }
}

function showSuccess(dayCount){
  document.getElementById('upload-form').style.display = 'none';
  document.getElementById('success-state').classList.add('show');
  document.getElementById('windows-found').innerHTML = `
    <div style="margin-top:16px;background:var(--teal-dim);border-radius:10px;padding:13px 15px;font-size:13px;color:var(--teal);text-align:center">
      ${dayCount} days marked as free. Waiting for the rest of the group to fill in their availability.
    </div>`;
}

function showError(title, sub){
  document.getElementById('main-card').innerHTML = `
    <div class="card-body error-state">
      <div class="error-title">${title}</div>
      <div class="error-sub">${sub}</div>
    </div>`;
}

loadTrip();
</script>
</body>
</html>
